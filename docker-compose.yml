version: "3.9"

services:

  postgres-db:
    image: postgres:17
    container_name: postgres-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: stockwiz

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5



    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    networks:
      - stockwiz-network

  backend-app:
    build: .
    container_name: backend-app
    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      postgres-db:
        condition: service_healthy


    networks:
      - stockwiz-network

networks:
  stockwiz-network:

volumes:
  postgres-data:
