name: Build and push Docker Image


on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: action/checkout@v4

      - name: Login to Docker Hub
       uses: docker/login-action@v3
       with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrest.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t vikrantkkk/deploy-backend:latest .

      - name: Push Image
        run: |
          docker push vikrantkkk/deploy-backend:latest
         

